<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale= 1.0">
    <title>LoL - Trading Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div
        style="text-align: center; margin-top: 40px; display: flex; flex-direction: column; align-items: center; gap: 15px;">
        <h1 style="color: var(--card-border); font-family: 'Cinzel', serif;">Champion Database</h1>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="search-bar" placeholder="Search a champion..."
                style="padding: 10px 20px; width: 300px; border-radius: 20px; border: 2px solid var(--card-border); background: #111418; color: white; font-size: 16px;">

            <select id="role-filter"
                style="padding: 10px 20px; border-radius: 20px; border: 2px solid var(--card-border); background: #111418; color: white; font-size: 16px; cursor: pointer;">
                <option value="all">All Roles</option>
            </select>
        </div>
    </div>

    <div id="pag-ctrls" style="margin: 30px; display: flex; justify-content: center; align-items: center; gap: 20px;">
        <button id="prev-btn"
            style="padding: 8px 16px; cursor: pointer; border-radius: 5px; background: var(--card-border); color: #0a0e17; border: none; font-weight: bold; font-size: 16px;">&#8592;
            Back</button>


        <select id="page-selector"
            style="padding: 8px 15px; font-size: 16px; border-radius: 5px; background: #111418; color: white; border: 2px solid var(--card-border); cursor: pointer; font-family: 'Oswald', sans-serif;"></select>

        <button id="next-btn"
            style="padding: 8px 16px; cursor: pointer; border-radius: 5px; background: var(--card-border); color: #0a0e17; border: none; font-weight: bold; font-size: 16px;">Next
            &#8594;</button>
    </div>

    <div id="card-container"></div>

    <div id="card-container"></div>
    <div id="champion-modal" class="modal">
        <span class="close-btn">&times;</span>
        <div id="" modal-body"></div>
    </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
